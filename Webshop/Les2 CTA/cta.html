<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTA</title>
    <link rel="stylesheet" href="cta.css">
</head>

<body>

    <section class="cta">

        <img src="/img/arkham.jpg" alt="Buy button">
        <h2 class="cta-text">Beste unreleased game webshop</h2>
        <button class="buy-here-button">Buy here</button>
    </section>

    <section>

        <h2>Uitgelicht</h2>
        <ul class="products">
            <li class="product">

                <img class="product-img" src="/img/gta6.jpg" alt="GTAVI">
                <div>GTA VI</div>
                <h3>Explore vice city!</h3>

            </li>
            <li class="product">

                <img class="product-img" src="/img/tf3.jpg" alt="tf3">
                <div>Titanfall 3</div>
                <h3>Explore the backstory of BT-7274</h3>

            </li>
        </ul>

    </section>





    <!-- Slideshow container -->
    <div class="slideshow-container">

        <!-- Full-width images with number and caption text -->
        <div class="mySlides fade">
            <div class="numbertext">1 / 3</div>
            <img src="/img/gta6.jpg" style="width:100%">
            <div class="text">Caption Text</div>
        </div>

        <div class="mySlides fade">
            <div class="numbertext">2 / 3</div>
            <img src="/img/tf3.jpg" style="width:100%">
            <div class="text">Caption Two</div>
        </div>

        <div class="mySlides fade">
            <div class="numbertext">3 / 3</div>
            <img src="/img/arkham.jpg" style="width:100%">
            <div class="text">Caption Three</div>
        </div>

        <!-- Next and previous buttons -->
        <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
        <a class="next" onclick="plusSlides(1)">&#10095;</a>
    </div>
    <br>

    <!-- The dots/circles -->
    <div style="text-align:center">
        <span class="dot" onclick="currentSlide(1)"></span>
        <span class="dot" onclick="currentSlide(2)"></span>
        <span class="dot" onclick="currentSlide(3)"></span>
    </div>
</body>

</html>
